  function t(key) { return (dict[currentLang] && dict[currentLang][key]) || dict.th[key] || key; }

  function localizeCategory(cat) { return currentLang === 'th' ? cat : ((categoryText[currentLang] && categoryText[currentLang][cat]) || cat); }
  function localizeUnit(unit) { return currentLang === 'th' ? unit : ((unitText[currentLang] && unitText[currentLang][unit]) || unit); }
  function localizeStatus(status) { return t(statusKey[status] || status); }
  function medDisplayName(med) { return currentLang === 'en' && med.nameEN ? med.nameEN : med.nameTH; }

  function setText(selector, key, html = false) {
    document.querySelectorAll(selector).forEach(el => {
      if (html) el.innerHTML = t(key);
      else el.textContent = t(key);
    });
  }
  function setPlaceholder(selector, key) { document.querySelectorAll(selector).forEach(el => el.setAttribute('placeholder', t(key))); }
  function setTitle(selector, key) { document.querySelectorAll(selector).forEach(el => el.setAttribute('title', t(key))); }

  function setSelectOptions(selectId, options, placeholderKey, selectedValue = '') {
    const select = document.getElementById(selectId);
    if (!select) return;
    select.innerHTML = `<option value="" disabled ${selectedValue ? '' : 'selected'}>${t(placeholderKey)}</option>`;
    options.forEach(opt => {
      const value = typeof opt === 'object' ? opt.value : opt;
      const label = typeof opt === 'object' ? opt.label : opt;
      const selected = String(value) === String(selectedValue) ? 'selected' : '';
      select.innerHTML += `<option value="${escapeHtml(value)}" ${selected}>${label}</option>`;
    });
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
  }

    });

  function showView(viewId) {

    targetView.style.opacity = '0';
    targetView.style.display = 'block';

    if (viewId === 'homeView') loadHomeData();
    if (viewId === 'requestView') initRequestForm();

  function loadHomeData() {
    const tbody = document.getElementById('historyTbody');
    if (tbody) tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-corporate" role="status"></div><div class="mt-2 text-muted small">${t('loadingData')}</div></td></tr>`;
    google.script.run.withSuccessHandler(renderHistoryTable).getBorrowRecords();
  }

  function renderHistoryTable(data) { allRecords = data || []; displayTable(allRecords); }

  function normalizeRow(row) {
    const normRow = {};
    for (let key in row) {
      if (Object.prototype.hasOwnProperty.call(row, key)) {
        const cleanKey = key.trim().replace(/\s+/g, '').toLowerCase();
        normRow[cleanKey] = row[key];
        normRow[key.trim()] = row[key];
      }
    }
    return normRow;
  }

  function displayTable(data) {
    const tbody = document.getElementById('historyTbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!data || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-5"><i class="fas fa-inbox fa-3x mb-3 text-light"></i><br>${t('noHistory')}</td></tr>`;
      return;
    }
    data.forEach(row => {
      const normRow = normalizeRow(row);
      const dateStr = normRow['วันที่'] || normRow['วันที่เบิก'] || normRow['date'] || '-';
      const nameStr = normRow['ชื่อ-สกุล'] || normRow['ชื่อสกุล'] || normRow['ชื่อ'] || normRow['name'] || '-';
      const compStr = normRow['บริษัท'] || normRow['company'] || '-';
      const sympStr = normRow['อาการป่วย'] || normRow['อาการ'] || normRow['symptom'] || '-';
      const medTH = normRow['ชื่อยา/th'] || normRow['ชื่อยาth'] || normRow['ชื่อยา'] || normRow['medth'] || '-';
      const medEN = normRow['ชื่อยา/en'] || normRow['ชื่อยาen'] || normRow['meden'] || '';
      const medStr = medEN ? `<div class="fw-bold text-corporate">${currentLang === 'en' ? escapeHtml(medEN) : escapeHtml(medTH)}</div><div class="small text-muted">${currentLang === 'en' ? escapeHtml(medTH) : escapeHtml(medEN)}</div>` : `<div class="fw-bold text-corporate">${escapeHtml(medTH)}</div>`;
      const qty = normRow['จำนวน'] || normRow['จำนวนที่เบิก'] || normRow['qty'] || '';
      const unit = normRow['หน่วยยา'] || normRow['หน่วย'] || normRow['unit'] || '';
      const qtyStr = qty + (unit ? ' ' + localizeUnit(unit) : '');
      tbody.innerHTML += `
        <tr>
          <td><span class="small text-muted"><i class="far fa-calendar-alt me-1"></i> ${escapeHtml(dateStr)}</span></td>
          <td class="fw-medium text-dark">${escapeHtml(nameStr)}</td>
          <td class="text-muted">${escapeHtml(compStr)}</td>
          <td class="text-truncate text-muted" style="max-width: 150px;" title="${escapeHtml(sympStr)}">${escapeHtml(sympStr)}</td>
          <td>${medStr}</td>
          <td class="text-center"><span class="badge bg-light-purple text-corporate px-3 py-2 border">${escapeHtml(qtyStr)}</span></td>
        </tr>`;
    });
  }

  function filterTable() {
    const fDate = document.getElementById('filterDate').value;
    const fName = document.getElementById('filterName').value.toLowerCase();
    const fComp = document.getElementById('filterCompany').value.toLowerCase();
    const filtered = allRecords.filter(row => {
      const normRow = normalizeRow(row);
      const dateStr = String(normRow['วันที่'] || normRow['วันที่เบิก'] || normRow['date'] || '');
      const nameStr = String(normRow['ชื่อ-สกุล'] || normRow['ชื่อสกุล'] || normRow['ชื่อ'] || normRow['name'] || '').toLowerCase();
      const compStr = String(normRow['บริษัท'] || normRow['company'] || '').toLowerCase();
      let matchDate = true;
      if (fDate) {
        const parts = fDate.split('-');
        const thFormat = `${parts[2]}/${parts[1]}/${parts[0]}`;
        matchDate = dateStr.includes(thFormat);
      }
      return matchDate && nameStr.includes(fName) && compStr.includes(fComp);
    });
    displayTable(filtered);
  }

  function clearFilters() {
    document.getElementById('filterDate').value = '';
    document.getElementById('filterName').value = '';
    document.getElementById('filterCompany').value = '';
    displayTable(allRecords);
  }

    const cat = document.getElementById('reqCategory').value;
    const medSelect = document.getElementById('reqMed');

    }).getMedicinesByCategory(cat);

  function displayMedInfo() {
    const index = document.getElementById('reqMed').value;
    if (index === '') return;
    const med = currentMedicines[index];
    const imgEl = document.getElementById('infoMedImage');
    const noImgEl = document.getElementById('infoMedNoImage');
    if (med.imageUrl) { imgEl.src = med.imageUrl; imgEl.style.display = 'block'; noImgEl.style.display = 'none'; }
    else { imgEl.src = ''; imgEl.style.display = 'none'; noImgEl.style.display = 'block'; }
    document.getElementById('infoMedEN').innerText = med.nameEN || '-';
    document.getElementById('infoExp').innerText = med.exp;
    document.getElementById('infoStock').innerText = med.remainQty;
    document.getElementById('infoUnit1').innerText = localizeUnit(med.unit);
    document.getElementById('infoUnit2').innerText = localizeUnit(med.unit);
    document.getElementById('reqQty').max = med.remainQty;
    if (!document.getElementById('reqQty').value) document.getElementById('reqQty').value = 1;
    sanitizeReqQty();
    document.getElementById('medInfoBox').style.display = 'block';
  }

  function getCartQtyByMedicineName(medTH) {
    return requestedMedicineItems
      .filter(item => item.medTH === medTH)
      .reduce((sum, item) => sum + (parseInt(item.qty, 10) || 0), 0);
  }

  function sanitizeReqQty() {
    const qtyInput = document.getElementById('reqQty');
    if (!qtyInput) return;

    let maxQty = parseInt(qtyInput.max, 10);
    let qty = parseInt(qtyInput.value, 10);

    if (Number.isNaN(qty) || qty < 1) qty = 1;
    if (!Number.isNaN(maxQty) && maxQty > 0 && qty > maxQty) qty = maxQty;

    qtyInput.value = qty;
  }

  function changeReqQty(step) {
    const qtyInput = document.getElementById('reqQty');
    if (!qtyInput) return;

    const maxQty = parseInt(qtyInput.max, 10);
    let qty = parseInt(qtyInput.value, 10);
    if (Number.isNaN(qty) || qty < 1) qty = 1;

    qty += step;
    if (qty < 1) qty = 1;
    if (!Number.isNaN(maxQty) && maxQty > 0 && qty > maxQty) qty = maxQty;

    qtyInput.value = qty;
    qtyInput.dispatchEvent(new Event('input'));
  }

  function addMedicineItem() {
    const medIndex = document.getElementById('reqMed').value;
    if (medIndex === '') { Swal.fire(t('alertWarning'), t('alertChooseMed'), 'warning'); return; }

    const med = currentMedicines[medIndex];
    const qtyInput = document.getElementById('reqQty');
    const qty = parseInt(qtyInput.value, 10);

    if (!qty || qty < 1) { Swal.fire(t('alertWarning'), t('alertQtyInvalid'), 'warning'); return; }

    const currentCartQty = getCartQtyByMedicineName(med.nameTH);
    if (currentCartQty + qty > med.remainQty) {
      document.getElementById('qtyError').classList.remove('d-none');
      Swal.fire(t('alertWarning'), t('alertDuplicateLimit'), 'warning');
      return;
    }

    document.getElementById('qtyError').classList.add('d-none');

    const existing = requestedMedicineItems.find(item => item.medTH === med.nameTH);
    if (existing) {
      existing.qty += qty;
    } else {
      requestedMedicineItems.push({
        category: document.getElementById('reqCategory').value,
        medTH: med.nameTH,
        medEN: med.nameEN || '',
        qty: qty,
        unit: med.unit || '',
        remainQty: med.remainQty || 0,
        exp: med.exp || '',
        imageUrl: med.imageUrl || ''
      });
    }

    qtyInput.value = '';
    renderMedicineCart();
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: t('alertItemAdded'), showConfirmButton: false, timer: 1200 });
  }

  function removeMedicineItem(index) {
    requestedMedicineItems.splice(index, 1);
    renderMedicineCart();
  }

  function renderMedicineCart() {
    const tbody = document.getElementById('medicineCartTbody');
    const counter = document.getElementById('medicineCartCount');
    if (!tbody) return;

    counter.textContent = requestedMedicineItems.length;

    if (!requestedMedicineItems.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted small">${t('cartEmpty')}</td></tr>`;
      return;
    }

    tbody.innerHTML = requestedMedicineItems.map((item, index) => `
      <tr>
        <td class="text-center fw-bold">${index + 1}</td>
        <td>
          <div class="fw-bold text-corporate">${escapeHtml(item.medTH)}</div>
          <div class="small text-muted">${escapeHtml(item.medEN || '-')} | ${escapeHtml(localizeCategory(item.category))}</div>
        </td>
        <td class="text-center fw-bold">${item.qty} ${escapeHtml(localizeUnit(item.unit))}</td>
        <td class="text-center text-success">${item.remainQty} ${escapeHtml(localizeUnit(item.unit))}</td>
        <td class="text-center">
          <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeMedicineItem(${index})" title="${t('cartAction')}">
            <i class="fas fa-trash-alt"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function submitForm(e) {
    e.preventDefault();

    if (!requestedMedicineItems.length) {
      Swal.fire(t('alertWarning'), t('alertAddItemFirst'), 'warning');
      return;
    }

    const formData = {
      name: document.getElementById('reqName').value.trim(),
      company: document.getElementById('reqCompany').value.trim(),
      gender: document.getElementById('reqGender').value,
      symptom: document.getElementById('reqSymptom').value.trim(),
      items: requestedMedicineItems.map(item => ({
        category: item.category,
        medTH: item.medTH,
        medEN: item.medEN,
        qty: parseInt(item.qty, 10),
        unit: item.unit
      }))
    };

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${t('alertSaving')}`;

    google.script.run.withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = `<i class="fas fa-paper-plane me-2"></i> <span data-i18n="btnSubmit">${t('btnSubmitMulti')}</span>`;
      if (res.success) {
        Swal.fire({ title: t('alertSaved'), text: translateMessage(res.message), icon: 'success', confirmButtonColor: '#7b5ab5' }).then(() => showView('homeView'));
      } else {
        Swal.fire(t('alertError'), translateMessage(res.message), 'error');
      }
    }).submitMedicineRequest(formData);
  }

  function showAdminLogin() {
    showView('loginView');
    document.getElementById('adminCode').value = '';
  }

  function loginAdmin() {
    const code = document.getElementById('adminCode').value.trim();
    if (!code) { Swal.fire(t('alertWarning'), t('alertAdminCode'), 'warning'); return; }
    google.script.run.withSuccessHandler(res => {
      if (res && res.success) {
        currentAdminName = res.name || '';
        const nameDisplay = document.getElementById('adminNameDisplay');
        if (nameDisplay) nameDisplay.innerText = currentAdminName;
        showView('adminView');
        loadAdminDashboard();
      } else {
        Swal.fire(t('alertError'), translateMessage((res && res.message) || t('alertAdminInvalid')), 'error');
      }
    }).validateAdminCode(code);
  }

  function loadAdminDashboard() {
    google.script.run.withSuccessHandler(data => {
      document.getElementById('statTotalItems').innerText = data.totalItems;
      document.getElementById('statRemain').innerText = data.totalRemaining;
      document.getElementById('statLow').innerText = data.lowStock;
      document.getElementById('statExp').innerText = data.expired;
      document.getElementById('statReqToday').innerText = data.reqToday;
      document.getElementById('statReqMonth').innerText = data.reqMonth;
      currentStockData = data.stockList || [];
      renderStockRows();
      renderSymptomStats();
    }).getStockDashboard();
  }

  function renderStockRows() {
    const tbody = document.getElementById('stockTbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!currentStockData.length) {
      tbody.innerHTML = `<tr><td colspan="10" class="text-center text-muted py-5">${t('noData')}</td></tr>`;
      return;
    }
    currentStockData.forEach((item, index) => {
      const impQty = parseInt(item.importQty, 10) || 0;
      const remQty = parseInt(item.remainQty, 10) || 0;
      let badgeClass = 'status-green';
      let qtyColorClass = 'text-success';
      let statusText = item.status;
      if (statusText === 'หมดอายุ') { badgeClass = 'status-red'; qtyColorClass = 'text-danger'; }
      else if (remQty === 0) { badgeClass = 'status-red'; qtyColorClass = 'text-danger'; statusText = 'หมดสต๊อก'; }
      else if (impQty > 0 && remQty <= (impQty * 0.10)) { badgeClass = 'status-yellow'; qtyColorClass = 'text-warning'; statusText = 'ใกล้หมด'; }
      else { badgeClass = 'status-green'; qtyColorClass = 'text-success'; statusText = 'พร้อมใช้งาน'; }
      const imgHtml = item.imageUrl ? `<img src="${escapeHtml(item.imageUrl)}" class="med-img-thumbnail me-3" onerror="this.src='https://placehold.co/45x45/f4f6f9/ccc?text=No+Img'">` : `<div class="med-img-placeholder me-3"><i class="fas fa-pills"></i></div>`;
      tbody.innerHTML += `
        <tr>
          <td><span class="text-muted small">${escapeHtml(localizeCategory(item.category))}</span></td>
          <td><div class="d-flex align-items-center">${imgHtml}<div><div class="fw-bold text-corporate">${escapeHtml(currentLang === 'en' && item.medEN ? item.medEN : item.medTH)}</div><div class="small text-muted">${escapeHtml(currentLang === 'en' && item.medEN ? item.medTH : (item.medEN || '-'))}</div></div></div></td>
          <td class="text-center">${escapeHtml(item.importQty)}</td>
          <td class="fw-bold text-center fs-6 ${qtyColorClass}">${escapeHtml(item.remainQty)}</td>
          <td class="text-center text-muted">${escapeHtml(localizeUnit(item.unit))}</td>
          <td class="small text-muted">${escapeHtml(item.mfg)}</td>
          <td class="small text-muted">${escapeHtml(item.exp)}</td>
          <td class="text-center small fw-bold text-primary">${escapeHtml(item.recorder || '-')}</td>
          <td class="text-center"><span class="status-badge ${badgeClass}">${localizeStatus(statusText)}</span></td>
          <td class="text-center"><button class="btn btn-sm btn-outline-primary shadow-sm" onclick="openEditModal(${index})" title="${t('editTitleAttr')}"><i class="fas fa-edit"></i></button></td>
        </tr>`;
    });
  }

  function renderSymptomStats() {
    const container = document.getElementById('symptomStatsContainer');
    if (!container) return;
    container.innerHTML = '';
    if (!allRecords.length) {
      container.innerHTML = `<div class="col-12 text-center text-muted small py-3">${t('noSymptoms')}</div>`;
      return;
    }
    const symptomCounts = {};
    let totalSymptomsCount = 0;
    allRecords.forEach(row => {
      const normRow = normalizeRow(row);
      const symptom = String(normRow['อาการป่วย'] || normRow['อาการ'] || normRow['symptom'] || '').trim();
      if (symptom && symptom !== '-') { symptomCounts[symptom] = (symptomCounts[symptom] || 0) + 1; totalSymptomsCount++; }
    });
    const sortedSymptoms = Object.keys(symptomCounts).map(key => ({ symptom: key, count: symptomCounts[key] })).sort((a, b) => b.count - a.count).slice(0, 6);
    if (!sortedSymptoms.length) {
      container.innerHTML = `<div class="col-12 text-center text-muted small py-3">${t('noSymptoms')}</div>`;
      return;
    }
    const colors = ['bg-primary', 'bg-success', 'bg-warning', 'bg-danger', 'bg-info', 'bg-secondary'];
    sortedSymptoms.forEach((item, index) => {
      const color = colors[index % colors.length];
      const percent = totalSymptomsCount > 0 ? Math.round((item.count / totalSymptomsCount) * 100) : 0;
      container.innerHTML += `
        <div class="col-md-4 col-sm-6">
          <div class="p-3 border rounded bg-light h-100">
            <div class="d-flex justify-content-between align-items-end mb-2">
              <span class="fw-bold text-dark text-truncate d-block" style="max-width: 70%;" title="${escapeHtml(item.symptom)}">${escapeHtml(item.symptom)}</span>
              <span class="badge ${color} rounded-pill">${item.count} ${t('times')}</span>
            </div>
            <div class="progress" style="height: 6px;"><div class="progress-bar ${color}" role="progressbar" style="width: ${percent}%" aria-valuenow="${percent}" aria-valuemin="0" aria-valuemax="100"></div></div>
            <div class="text-end text-muted small mt-1">${percent}% ${t('percentAll')}</div>
          </div>
        </div>`;
    });
  }

  function showAddStockModal() {
    if (!modalStock) modalStock = new bootstrap.Modal(document.getElementById('addStockModal'));
    document.getElementById('addStockForm').reset();
    refreshCategorySelect('addCat');
    updateModalStaticText();
    modalStock.show();
  }

  function formatDateForSheet(dateStr) {
    if (!dateStr) return '';
    const p = dateStr.split('-');
    return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : dateStr;
  }
  function parseDateForInput(dateStr) {
    if (!dateStr) return '';
    const p = dateStr.split('/');
    return p.length === 3 ? `${p[2]}-${p[1].padStart(2, '0')}-${p[0].padStart(2, '0')}` : '';
  }

  function submitNewStock(e) {
    e.preventDefault();
    const data = {
      category: document.getElementById('addCat').value,
      nameTH: document.getElementById('addMedTH').value,
      nameEN: document.getElementById('addMedEN').value,
      imageUrl: document.getElementById('addImgUrl').value,
      qty: document.getElementById('addQty').value,
      unit: document.getElementById('addUnit').value,
      mfg: formatDateForSheet(document.getElementById('addMfg').value),
      exp: formatDateForSheet(document.getElementById('addExp').value),
      lot: document.getElementById('addLot').value,
      adminName: currentAdminName
    };
    const btn = document.getElementById('btnAddStockSubmit');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${t('alertSaving')}`;
    google.script.run.withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = `<i class="fas fa-save me-2"></i> ${t('btnSave')}`;
      if (res.success) {
        modalStock.hide();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: translateMessage(res.message) || t('alertAddSuccess'), showConfirmButton: false, timer: 1500 });
        loadAdminDashboard();
      } else { Swal.fire(t('alertError'), translateMessage(res.message), 'error'); }
    }).addMedicineStock(data);
  }

  function openEditModal(index) {
    if (!editModal) editModal = new bootstrap.Modal(document.getElementById('editStockModal'));
    const item = currentStockData[index];
    refreshCategorySelect('editCat', item.category);
    document.getElementById('editRowIndex').value = item.rowIndex;
    document.getElementById('editMedTH').value = item.medTH;
    document.getElementById('editMedEN').value = item.medEN || '';
    document.getElementById('editImgUrl').value = item.imageUrl || '';
    document.getElementById('editImportQty').value = item.importQty;
    document.getElementById('editRemainQty').value = item.remainQty;
    document.getElementById('editUnit').value = item.unit;
    document.getElementById('editMfg').value = parseDateForInput(item.mfg);
    document.getElementById('editExp').value = parseDateForInput(item.exp);
    document.getElementById('editLot').value = item.lot || '';
    updateModalStaticText();
    editModal.show();
  }

  function submitEditStock(e) {
    e.preventDefault();
    const data = {
      rowIndex: document.getElementById('editRowIndex').value,
      category: document.getElementById('editCat').value,
      nameTH: document.getElementById('editMedTH').value,
      nameEN: document.getElementById('editMedEN').value,
      imageUrl: document.getElementById('editImgUrl').value,
      importQty: document.getElementById('editImportQty').value,
      remainQty: document.getElementById('editRemainQty').value,
      unit: document.getElementById('editUnit').value,
      mfg: formatDateForSheet(document.getElementById('editMfg').value),
      exp: formatDateForSheet(document.getElementById('editExp').value),
      lot: document.getElementById('editLot').value,
      adminName: currentAdminName
    };
    const btn = document.getElementById('btnEditStockSubmit');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ${t('alertUpdating')}`;
    google.script.run.withSuccessHandler(res => {
      btn.disabled = false;
      btn.innerHTML = `<i class="fas fa-save me-2"></i> ${t('btnUpdate')}`;
      if (res.success) {
        editModal.hide();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: translateMessage(res.message) || t('alertUpdateSuccess'), showConfirmButton: false, timer: 1500 });
        loadAdminDashboard();
      } else { Swal.fire(t('alertError'), translateMessage(res.message), 'error'); }
    }).updateMedicineStock(data);
  }

  window.onload = () => {
    const selector = document.getElementById('langSelector');
    if (selector) selector.value = currentLang;
    applyLanguage();
    loadHomeData();
  };
</script>
